name: Constellation GitHub CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-basedpyright:
    name: Python Lint Check (basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python Venv
        uses: getsentry/action-setup-venv@v3.2.0
        with:
          python-version: "3.11"
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .[dev]

      - name: Run basedpyright
        run: basedpyright src

  lint-ruff:
    name: Python Lint Check (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: check

  format-ruff:
    name: Python Format Check (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: format --diff

  format-reuse:
    name: Format (reuse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v5

  format-codespell:
    name: Format (codespell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Codespell Check
        uses: codespell-project/actions-codespell@v2
